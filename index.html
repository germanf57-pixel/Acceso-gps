<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Acceso - Distribuidora Don Chicho</title>
<style>
body{font-family:Arial,sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;background:#111;color:#fff;text-align:center;margin:0}
#box{max-width:600px;padding:20px}
.btn{padding:10px 18px; margin-top: 15px; cursor: pointer; background-color: #4CAF50; color: white; border: none; border-radius: 5px; font-size: 16px;}
.btn:hover {background-color: #45a049;}
/* Eliminamos los estilos del iframe porque ya no lo usaremos */
</style>
</head>
<body>

<div id="box">
    <h2>Verificando ubicación...</h2>
    <p id="msg">Acepta el permiso de ubicación.</p>
    <button id="retry" class="btn" style="display:none" onclick="check()">Reintentar</button>
    <button id="enter" class="btn" style="display:none" onclick="redirect()">Ingresar al Sitio</button>
</div>

<script>
// IMPORTANTE: Cambiá este enlace por la URL PÚBLICA de tu sitio en Google Sites una vez publicado.
const SITE = "https://sites.google.com/view/paginadepruebaur6/p%C3%A1gina-principal";

const LAT = -31.341776698863352, LON = -66.59105155190622, R = 70;

function dist(a,b,c,d){
    const Rm = 6371000, t = x => x*Math.PI/180;
    const d1 = t(c-a), d2 = t(d-b), aa = Math.sin(d1/2)**2+Math.cos(t(a))*Math.cos(t(c))*Math.sin(d2/2)**2;
    return 2*Rm*Math.atan2(Math.sqrt(aa),Math.sqrt(1-aa));
}

function fail(m){
    let msg = document.getElementById("msg");
    let retry = document.getElementById("retry");
    let enter = document.getElementById("enter");
    
    msg.textContent = m;
    retry.style.display = 'inline-block';
    enter.style.display = 'none';
}

function success() {
    let msg = document.getElementById("msg");
    let retry = document.getElementById("retry");
    let enter = document.getElementById("enter");
    
    msg.textContent = "¡Ubicación verificada! Ya puedes acceder.";
    retry.style.display = 'none';
    enter.style.display = 'inline-block';
    
    // Opcional: Si querés que redirija solo sin tocar el botón, descomentá la siguiente línea.
    // Aunque el botón es más seguro para evitar bloqueos del navegador.
    // window.location.href = SITE; 
}

function redirect() {
    window.location.href = SITE;
}

function check(){
    let msg = document.getElementById("msg");
    let retry = document.getElementById("retry");
    
    retry.style.display = 'none';
    msg.textContent = "Verificando tu ubicación...";
    
    if(!navigator.geolocation){
        fail("Este dispositivo no soporta GPS.");
        return;
    }

    navigator.geolocation.getCurrentPosition(p => {
        let d = dist(LAT, LON, p.coords.latitude, p.coords.longitude);
        if(d <= R){
            success(); // Si está a menos de 30 metros, mostramos el botón de éxito
        } else {
            fail("Debes estar dentro del Rango Permitido. Distancia: " + Math.round(d) + " m.");
        }
    }, e => {
        if(e.code == 1) fail("Debes permitir el acceso a la ubicación cuando el navegador te lo pregunte.");
        else fail("No se pudo obtener la ubicación. Activa el GPS.");
    }, {enableHighAccuracy: true, timeout: 15000, maximumAge: 0});
}

// Iniciamos la comprobación al cargar la página
check();
</script>
</body>
</html>
