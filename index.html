<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Acceso</title>
<style>
body{font-family:Arial,sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;background:#111;color:#fff;text-align:center;margin:0}
#box{max-width:600px;padding:20px}.btn{padding:10px 18px}
iframe{display:none;width:100%;height:100vh;border:0;position:fixed;left:0;top:0}
</style></head><body>
<div id="box"><h2>Verificando ubicación...</h2><p id="msg">Acepta el permiso de ubicación.</p><button id="retry" class="btn" style="display:none" onclick="check()">Reintentar</button></div>
<iframe id="frame" src=""></iframe>
<script>
const LAT=-31.341766,LON=-66.591073,R=70;
const SITE="https://sites.google.com/view/paginadepruebaur6/p%C3%A1gina-principal";
function dist(a,b,c,d){const Rm=6371000,t=x=>x*Math.PI/180;
const d1=t(c-a),d2=t(d-b),aa=Math.sin(d1/2)**2+Math.cos(t(a))*Math.cos(t(c))*Math.sin(d2/2)**2;
return 2*Rm*Math.atan2(Math.sqrt(aa),Math.sqrt(1-aa));}
function fail(m){msg.textContent=m;retry.style.display='inline-block';}
function check(){
retry.style.display='none';
if(!navigator.geolocation){fail("Este dispositivo no soporta GPS.");return;}
navigator.geolocation.getCurrentPosition(p=>{
if(p.coords.accuracy>100){msg.textContent="Esperando una ubicación más precisa...";}
let d=dist(LAT,LON,p.coords.latitude,p.coords.longitude);
if(d<=R){
document.getElementById("box").style.display="none";
let f=document.getElementById("frame");f.src=SITE;f.style.display="block";
}else fail("Debes estar dentro de 30 metros del punto autorizado. Distancia: "+Math.round(d)+" m.");
},e=>{
if(e.code==1)fail("Debes permitir el acceso a la ubicación.");
else fail("No se pudo obtener la ubicación. Activa el GPS.");
},{enableHighAccuracy:true,timeout:15000,maximumAge:0});
}
check();
</script></body></html>
