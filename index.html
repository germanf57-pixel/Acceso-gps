<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Registro de Cursantes</title>
<style>
body{font-family:Arial,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#111;color:#fff;text-align:center;margin:0;padding:20px;box-sizing:border-box;}
#box{max-width:500px;width:100%;background:#222;padding:30px;border-radius:10px;box-shadow:0 4px 15px rgba(0,0,0,0.5);}
.btn{padding:12px 20px; margin-top: 15px; cursor: pointer; background-color: #4CAF50; color: white; border: none; border-radius: 5px; font-size: 16px; width: 100%; font-weight: bold;}
.btn:hover {background-color: #45a049;}
.btn-retry{background-color: #f44336;}
.btn-retry:hover{background-color: #da190b;}
#form-container { display: none; text-align: left; }
.form-group { margin-bottom: 15px; }
.form-group label { display: block; margin-bottom: 5px; font-size: 14px; color: #ccc; font-weight: bold; }
.form-group input, .form-group select { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #444; background: #333; color: #fff; box-sizing: border-box; font-size: 16px; }
.form-group select option { background: #222; color: #fff; }
</style>
</head>
<body>

<div id="box">
    <!-- Estado de carga y GPS -->
    <div id="gps-container">
        <h2 id="title">Conectando con el panel...</h2>
        <p id="msg">Obteniendo parámetros de seguridad del curso.</p>
        <button id="retry" class="btn btn-retry" style="display:none" onclick="cargarConfiguracion()">Reintentar</button>
    </div>

    <!-- Formulario de Inscripción Seguro -->
    <div id="form-container">
        <h2 style="margin-top:0;">Registro de Cursante</h2>
        <p style="color: #4CAF50; font-size: 14px; margin-bottom: 20px;">✓ Dispositivo y Ubicación validados.</p>
        
        <form id="cursoForm" onsubmit="enviarDatos(event)">
            <div class="form-group">
                <label for="apellido">APELLIDO:</label>
                <input type="text" id="apellido" placeholder="Ingrese sus apellidos" required>
            </div>
            
            <div class="form-group">
                <label for="nombre">NOMBRE:</label>
                <input type="text" id="nombre" placeholder="Ingrese sus nombres" required>
            </div>
            
            <div class="form-group">
                <label for="dni">DNI:</label>
                <input type="number" id="dni" placeholder="Solo números, sin puntos" required>
            </div>
            
            <div class="form-group">
                <label for="jerarquia">JERARQUÍA:</label>
                <select id="jerarquia" required>
                    <option value="" disabled selected>Seleccione su jerarquía...</option>
                    <option value="AGENTE">AGENTE</option>
                    <option value="CABO">CABO</option>
                    <option value="CABO 1°">CABO 1°</option>
                    <option value="SARGENTO">SARGENTO</option>
                    <option value="SARGENTO 1°">SARGENTO 1°</option>
                    <option value="SUB OFICIAL ESCRIBIENTE">SUB OFICIAL ESCRIBIENTE</option>
                    <option value="SUB OFICIAL AUXILIAR">SUB OFICIAL AUXILIAR</option>
                    <option value="SUB OFICIAL MAYOR">SUB OFICIAL MAYOR</option>
                    <option value="OFICIAL AYUDANTE">OFICIAL AYUDANTE</option>
                    <option value="OFICIAL SUB INSPECTOR">OFICIAL SUB INSPECTOR</option>
                    <option value="OFICIAL INSPECTOR">OFICIAL INSPECTOR</option>
                    <option value="OFICIAL PRINCIPAL">OFICIAL PRINCIPAL</option>
                    <option value="SUB COMISARIO">SUB COMISARIO</option>
                    <option value="COMISARIO">COMISARIO</option>
                    <option value="COMISARIO INSPECTOR">COMISARIO INSPECTOR</option>
                    <option value="COMISARIO MAYOR">COMISARIO MAYOR</option>
                    <option value="COMISARIO GENERAL">COMISARIO GENERAL</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="dependencia">DEPENDENCIA:</label>
                <select id="dependencia" required>
                    <option value="" disabled selected>Seleccione su dependencia...</option>
                    <option value="CRIA ULAPES">CRIA ULAPES</option>
                    <option value="CRIA MILAGRO">CRIA MILAGRO</option>
                    <option value="CRIA TELLO">CRIA TELLO</option>
                    <option value="CRIA CATUNA">CRIA CATUNA</option>
                    <option value="CRIA MALANZAN">CRIA MALANZAN</option>
                    <option value="CRIA PORTEZUELO">CRIA PORTEZUELO</option>
                    <option value="SUB COMISARIA NACATE">SUB COMISARIA NACATE</option>
                    <option value="SUB COMISARIA LA COLONIA">SUB COMISARIA LA COLONIA</option>
                    <option value="CRIA DE LA MUJER EL MENOR Y LA FAMILIA">CRIA DE LA MUJER EL MENOR Y LA FAMILIA</option>
                    <option value="UNIDAD DE SEGURIDAD DE PREVENCION TERRITORIAL">UNIDAD DE SEGURIDAD DE PREVENCION TERRITORIAL</option>
                    <option value="UNIDAD OPERATIVA ESPECIAL DE LUCHA CONTRA EL NARCOTRAFICO">UNIDAD OPERATIVA ESPECIAL DE LUCHA CONTRA EL NARCOTRAFICO</option>
                    <option value="SEGURIDAD VIAL CHEPES">SEGURIDAD VIAL CHEPES</option>
                    <option value="DPTO INVESTIGACIONES CHEPES">DPTO INVESTIGACIONES CHEPES</option>
                    <option value="ESCUELA DE FORMACION DE AGENTES">ESCUELA DE FORMACION DE AGENTES</option>
                    <option value="AYUDANTIA DE REGIONAL">AYUDANTIA DE REGIONAL</option>
                </select>
            </div>
            
            <button type="submit" id="submitBtn" class="btn">Confirmar Asistencia</button>
        </form>
    </div>
</div>

<script>
// PEGA ACÁ TU URL DE APPS SCRIPT
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxZ0q2IoncfrVFc-pp4kMoZmcjBCQ1AHTmsUh-mHygTWoN6um9LPzm0qaD7ge-_K7myJw/exec"; 

// Variables globales que se llenarán solas desde la planilla
let CONFIG = { latitud: 0, longitud: 0, radio: 0, id_curso: "" };

function dist(a,b,c,d){
    const Rm = 6371000, t = x => x*Math.PI/180;
    const d1 = t(c-a), d2 = t(d-b), aa = Math.sin(d1/2)**2+Math.cos(t(a))*Math.cos(t(c))*Math.sin(d2/2)**2;
    return 2*Rm*Math.atan2(Math.sqrt(aa),Math.sqrt(1-aa));
}

function fail(m){
    document.getElementById("title").textContent = "Atención";
    document.getElementById("msg").textContent = m;
    document.getElementById("retry").style.display = 'inline-block';
}

// Paso 1: Leer el panel de control remoto de Google Sheets
function cargarConfiguracion() {
    document.getElementById("retry").style.display = 'none';
    document.getElementById("title").textContent = "Conectando...";
    document.getElementById("msg").textContent = "Estableciendo conexión segura...";

    fetch(WEB_APP_URL)
    .then(res => res.json())
    .then(data => {
        if(data.error) {
            fail("Error en el panel de control: " + data.error);
            return;
        }
        CONFIG = data;
        
        // SEGURIDAD: Validar si este dispositivo ya completó ESTE curso concreto
        if (localStorage.getItem("asistencia_enviada_" + CONFIG.id_curso)) {
            fail("Este dispositivo ya se encuentra registrado en el curso actual (" + CONFIG.id_curso + "). No se permiten duplicados.");
            return;
        }

        // Si el dispositivo está limpio, pasamos a validar el GPS
        validarGPS();
    })
    .catch(err => {
        fail("No se pudo obtener la configuración. Verifica tu conexión a internet.");
        console.error(err);
    });
}

// Paso 2: Validar ubicación en base a los datos descargados
function validarGPS(){
    let msg = document.getElementById("msg");
    document.getElementById("title").textContent = "Verificando GPS...";
    msg.textContent = "Estabilizando señal satelital... Por favor espera.";
    
    if(!navigator.geolocation){
        fail("Este dispositivo no cuenta con soporte de geolocalización.");
        return;
    }

    let intentos = 0;
    const maxIntentos = 5;

    function obtenerPosicion() {
        navigator.geolocation.getCurrentPosition(p => {
            intentos++;
            let precision = p.coords.accuracy;
            
            if (precision > 40 && intentos < maxIntentos) {
                msg.textContent = `Ajustando precisión del GPS... (Intento ${intentos}/${maxIntentos})`;
                setTimeout(obtenerPosicion, 2000);
                return;
            }

            let d = dist(CONFIG.latitud, CONFIG.longitud, p.coords.latitude, p.coords.longitude);
            if (d <= CONFIG.radio) {
                // Éxito: Ocultamos pantalla de carga y mostramos formulario
                document.getElementById("gps-container").style.display = 'none';
                document.getElementById("form-container").style.display = 'block';
            } else {
                fail(`Fuera de Rango. Distancia: ${Math.round(d)} metros.`);
            }
        }, e => {
            fail("Es obligatorio activar y permitir el acceso al GPS para continuar con la asistencia.");
        }, {enableHighAccuracy: true, timeout: 10000, maximumAge: 0});
    }
    obtenerPosicion();
}

// Paso 3: Enviar los datos del cursante
function enviarDatos(event) {
    event.preventDefault();
    
    let btn = document.getElementById("submitBtn");
    btn.disabled = true;
    btn.textContent = "Registrando asistencia...";

    let datosFormulario = {
        apellido: document.getElementById("apellido").value.toUpperCase().trim(), 
        nombre: document.getElementById("nombre").value.toUpperCase().trim(),
        dni: document.getElementById("dni").value.trim(),
        jerarquia: document.getElementById("jerarquia").value,
        dependencia: document.getElementById("dependencia").value
    };

    fetch(WEB_APP_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(datosFormulario)
    })
    .then(() => {
        // SEGURIDAD: Guardamos en la memoria del celular que ya completó ESTE curso exacto
        localStorage.setItem("asistencia_enviada_" + CONFIG.id_curso, "true");
        
        document.getElementById("box").innerHTML = "<h2 style='color: #4CAF50;'>¡Registro Exitoso!</h2><p>Tu asistencia ha sido guardada correctamente en la base de datos.</p>";
    })
    .catch(err => {
        alert("Ocurrió un error al enviar. Intenta de nuevo.");
        btn.disabled = false;
        btn.textContent = "Confirmar Asistencia";
    });
}

// Iniciar todo el flujo automático al abrir la página
cargarConfiguracion();
</script>
</body>
</html>
